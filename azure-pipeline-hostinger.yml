trigger: none
pr: none
variables:
  - name: dockerRegistryServiceConnection
    value: 'jetfyx-acr-connection'
  - name: imageRepository
    value: 'jetwebapp-prod-api'
  - name: containerRegistry
    value: 'jetfyx.azurecr.io'
  - name: dockerfilePath
    value: '/CRM_Backend/Dockerfile'
  - name: tag
    value: '$(Build.BuildId)'
  - name: azureSubscription
    value: 'jetfyx-azure-service-connection-prod'
  - name: appName
    value: 'jetwebapp-api-prod'
  - name: rg
    value: 'rg-jetfyx-prod'
stages:
- stage: Build
  displayName: Build and Push Docker Image
  jobs:
  - job: Build
    pool:
      vmImage: 'ubuntu-latest'
 
    - task: Docker@2
      displayName: Build and Push Image
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

- stage: Deploy
  displayName: Deploy to Hostinger
  dependsOn: Build
  jobs:
  - job: Deploy
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: SSH@0
      displayName: Deploy Backend Container
      inputs:
        sshEndpoint: 'hostinger-vps'
        runOptions: inline
        inline: |
          set -e
          echo "Deploying image: $(containerRegistry)/$(imageRepository):$(tag)"

          # Ensure network exists
          docker network inspect crmnet >/dev/null 2>&1 || docker network create crmnet

          # Stop and remove existing backend
          docker rm -f $(appName) || true

          # Pull new image
          docker pull $(containerRegistry)/$(imageRepository):$(tag)

          # Run backend container
          docker run -d \
            --name $(appName) \
            --network crmnet \
            -p 9070:5000 \
            --restart always \
            -e ASPNETCORE_ENVIRONMENT=Production \
            $(containerRegistry)/$(imageRepository):$(tag)