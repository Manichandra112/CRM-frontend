trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  registry: registry.nafabarter.com
  imageName: crm-backend
  tag: $(Build.BuildId)

steps:

# Build image
- task: Docker@2
  displayName: Build image
  inputs:
    command: build
    Dockerfile: '**/Dockerfile'
    repository: $(registry)/$(imageName)
    tags: |
      latest
      $(tag)

# Push image
- task: Docker@2
  displayName: Push image
  inputs:
    command: push
    repository: $(registry)/$(imageName)
    containerRegistry: nafa-registry
    tags: |
      latest
      $(tag)

# Trigger Portainer webhook
- script: |
    curl -X POST https://portainer.yourdomain.com/api/webhooks/XXXX
  displayName: Trigger Portainer deployment