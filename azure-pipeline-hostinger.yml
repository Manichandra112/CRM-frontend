trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageName: crm-backend
  tag: $(Build.BuildId)

steps:

# Build image
- task: Docker@2
  displayName: Build image
  inputs:
    command: build
    Dockerfile: '**/Dockerfile'
    repository: $(imageName)
    tags: |
      latest
      $(tag)

# Push image
- task: Docker@2
  displayName: Push image
  inputs:
    command: push
    repository: $(imageName)
    containerRegistry: nafa-registry
    tags: |
      latest
      $(tag)

# Trigger Portainer
