trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  imageName: 'crm-backend'
  registry: 'registry.nafabarter.com'
  fullImageName: '$(registry)/$(imageName)'
  tag: '$(Build.BuildId)'

steps:

- task: Docker@2
  displayName: 'Build and push $(imageName)'
  inputs:
    command: buildAndPush
    containerRegistry: 'nafa-registry'
    repository: '$(imageName)'
    Dockerfile: '**/Dockerfile'
    tags: |
      latest
      $(tag)

# Optional – uncomment if you want to trigger a Portainer / webhook deployment after successful push
